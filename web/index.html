<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Five-bar linkage simulator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="lab-header">
      <a class="lab-brand" href="https://unswei.github.io/" title="embodied intelligence and collective robotics">
        <img src="https://unswei.github.io/images/eicrl-logo-32x32.png" alt="" width="32" height="32" />
        <span class="lab-brand-copy">
          <strong class="lab-title">embodied intelligence and collective robotics</strong>
          <small class="lab-subtitle">research @ UNSW</small>
        </span>
      </a>
      <nav class="lab-nav" aria-label="Five-bar tools">
        <a href="https://unswei.github.io/">Lab</a>
        <a href="https://unswei.github.io/projects/">Projects</a>
        <a href="https://unswei.github.io/projects/fivebar/">Project</a>
        <a class="active" href="./">Simulator</a>
        <a href="./singularity.html">Singularity</a>
        <a class="lab-nav-icon" href="https://github.com/unswei/fivebar" aria-label="Five-bar GitHub repository" title="GitHub repository">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
            <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.29 9.41 7.86 10.94.58.11.79-.25.79-.56v-2.16c-3.2.7-3.87-1.37-3.87-1.37-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.16 1.18A10.9 10.9 0 0 1 12 5.56c.98 0 1.95.13 2.86.38 2.19-1.49 3.15-1.18 3.15-1.18.63 1.58.23 2.75.12 3.04.73.8 1.17 1.83 1.17 3.08 0 4.42-2.69 5.39-5.25 5.68.41.35.78 1.05.78 2.12v3.14c0 .31.21.67.8.56A11.52 11.52 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z" />
          </svg>
        </a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="tool-heading">
        <div>
          <h1>Five-bar linkage simulator</h1>
          <p>Static browser model for linkage geometry, singularity margins, and tip-load torque.</p>
        </div>
        <div class="config-summary" id="configSummary"></div>
      </section>

      <section class="workspace">
        <aside class="readout-panel" aria-label="Pose readout">
          <h2>Readout</h2>
          <dl id="readout"></dl>
          <button id="clearTrace" type="button" title="Clear trajectory trace">
            <span aria-hidden="true">↺</span>
            Clear trace
          </button>
        </aside>

        <section class="plot-panel" aria-label="Linkage plot">
          <svg id="plot" viewBox="0 0 900 650" role="img" aria-label="Five-bar linkage plot">
            <defs>
              <pattern id="minorGrid" width="45" height="45" patternUnits="userSpaceOnUse">
                <path d="M 45 0 L 0 0 0 45" fill="none" stroke="#eceff3" stroke-width="1" />
              </pattern>
              <pattern id="majorGrid" width="180" height="180" patternUnits="userSpaceOnUse">
                <rect width="180" height="180" fill="url(#minorGrid)" />
                <path d="M 180 0 L 0 0 0 180" fill="none" stroke="#d4dae2" stroke-width="1.4" />
              </pattern>
            </defs>
            <rect width="900" height="650" fill="url(#majorGrid)" />
            <g id="plotLayer"></g>
          </svg>
        </section>

        <aside class="control-panel" aria-label="Simulator controls">
          <h2>Controls</h2>
          <div class="control-group">
            <label>
              <span>Left inward angle</span>
              <output id="leftAngleValue"></output>
              <input id="leftAngle" type="range" min="-180" max="180" step="0.1" />
            </label>
            <label>
              <span>Right inward angle</span>
              <output id="rightAngleValue"></output>
              <input id="rightAngle" type="range" min="-180" max="180" step="0.1" />
            </label>
          </div>

          <div class="control-group">
            <label>
              <span>Target distance</span>
              <output id="distanceValue"></output>
              <input id="targetDistance" type="range" min="0" max="1.8" step="0.001" />
            </label>
            <label>
              <span>Target angle</span>
              <output id="targetAngleValue"></output>
              <input id="targetAngle" type="range" min="0" max="180" step="0.1" />
            </label>
          </div>

          <div class="control-group">
            <label>
              <span>Gravity x</span>
              <output id="gravityXValue"></output>
              <input id="gravityX" type="range" min="-20" max="20" step="0.01" />
            </label>
            <label>
              <span>Gravity y</span>
              <output id="gravityYValue"></output>
              <input id="gravityY" type="range" min="-20" max="20" step="0.01" />
            </label>
          </div>

          <fieldset class="branch-control">
            <legend>Closure branch</legend>
            <label><input type="radio" name="branch" value="1" /> +1</label>
            <label><input type="radio" name="branch" value="-1" /> -1</label>
          </fieldset>

          <fieldset class="branch-control branch-control-vertical">
            <legend>IK branch pair</legend>
            <select id="ikBranchPair">
              <option value="auto">automatic</option>
              <option value="1,1">(+1, +1)</option>
              <option value="1,-1">(+1, -1)</option>
              <option value="-1,1">(-1, +1)</option>
              <option value="-1,-1">(-1, -1)</option>
            </select>
            <label><input id="preventBranchSwitching" type="checkbox" /> prevent branch switching</label>
          </fieldset>
        </aside>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
